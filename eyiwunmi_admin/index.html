<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eyiwunmi Fashion – Admin Dashboard</title>
    <link rel="icon" type="image/png" href="../eyiwunmi_images/LOGO_FAVICON.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --purple-950: #1C1026;
            --purple-900: #2D1B3D;
            --purple-850: #3D2554;
            --purple-800: #4A2B5F;
            --purple-700: #6C3B8C;
            --purple-500: #A78BFA;
            --gold: #D4AF37;
            --gold-light: #F0D060;
            --white: #ffffff;
            --gray-100: #F3F4F6;
            --gray-300: #D1D5DB;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --red-500: #EF4444;
            --teal-500: #10B981;
            --radius-lg: 16px;
            --radius-md: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Playfair Display', serif;
        }

        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--purple-950);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--purple-900);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--purple-700);
            border-radius: 10px;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: var(--purple-900);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            padding: 24px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            text-decoration: none;
        }

        .brand-logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            object-fit: cover;
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--white);
        }

        .brand-name span {
            color: var(--gold);
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            text-decoration: none;
            transition: var(--transition);
        }

        .menu-item a:hover,
        .menu-item.active a {
            color: var(--white);
            background: var(--purple-800);
        }

        .menu-item.active a {
            border-left: 4px solid var(--gold);
            background: rgba(167, 139, 250, 0.15);
        }

        .menu-item a .icon {
            font-size: 1.2rem;
            width: 24px;
            display: inline-block;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .content-header h1 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--white), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--purple-950);
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.35);
        }

        /* ===== PAGES ===== */
        .page {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== DASHBOARD WIDGETS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(145deg, var(--purple-900), var(--purple-850));
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(212, 175, 55, 0.25);
        }

        .stat-card .info h3 {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .info .number {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--white);
            line-height: 1.1;
        }

        .stat-card .info .number span {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--gold);
        }

        .stat-card .icon-box {
            width: 56px;
            height: 56px;
            background: rgba(167, 139, 250, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        /* ===== DATA TABLES ===== */
        .table-container {
            background: var(--purple-900);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 45px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(0, 0, 0, 0.15);
            padding: 18px 24px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        td {
            padding: 16px 24px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .img-cell {
            width: 50px;
            height: 60px;
            border-radius: var(--radius-md);
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .badge-span {
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-span.new { background: rgba(16, 185, 129, 0.2); color: var(--teal-500); }
        .badge-span.sale { background: rgba(239, 68, 68, 0.2); color: var(--red-500); }
        .badge-span.luxury { background: rgba(212, 175, 55, 0.2); color: var(--gold); }
        .badge-span.none { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.4); }

        .btn-action {
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            margin-right: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-action.edit {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold-light);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .btn-action.edit:hover {
            background: var(--gold);
            color: var(--purple-950);
        }

        .btn-action.delete {
            background: rgba(239, 68, 68, 0.15);
            color: var(--red-500);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-action.delete:hover {
            background: var(--red-500);
            color: var(--white);
        }

        /* ===== MODAL & FORM ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(28, 16, 38, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: var(--purple-900);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalSlide 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .modal-header h2 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--gold);
        }

        .modal-header .btn-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.6rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-header .btn-close:hover {
            color: var(--white);
        }

        .modal-body {
            padding: 28px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-full {
            grid-column: 1 / -1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: var(--white);
            font-family: var(--font-sans);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(0, 0, 0, 0.4);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-footer {
            padding: 20px 28px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-secondary {
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-secondary:hover {
            color: var(--white);
            border-color: var(--white);
        }

        /* ===== INBOX CARDS ===== */
        .msg-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg-card {
            background: var(--purple-900);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            transition: var(--transition);
        }

        .msg-card:hover {
            border-color: rgba(212, 175, 55, 0.15);
        }

        .msg-card .msg-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .msg-card .msg-header .sender-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--gold-light);
        }

        .msg-card .msg-header .date {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.45);
        }

        .msg-card .sender-meta {
            font-size: 0.85rem;
            color: var(--purple-500);
            font-weight: 500;
        }

        .msg-card .msg-text {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.15);
            padding: 16px;
            border-radius: var(--radius-md);
            border-left: 3px solid var(--gold);
        }

        .msg-card .btn-delete-msg {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .msg-card .btn-delete-msg:hover {
            color: var(--red-500);
            transform: scale(1.1);
        }

        /* ===== empty states ===== */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state .icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
            display: block;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 16px 8px; }
            .brand-name, .sidebar-footer, .menu-item a span { display: none; }
            .main-content { margin-left: 80px; padding: 24px; }
            .sidebar-logo { margin: 0 auto; }
            .menu-item a { justify-content: center; padding: 12px; }
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <a href="#" class="brand-header">
            <img src="../eyiwunmi_images/LOGO_FAVICON.png" alt="Eyiwunmi Logo" class="brand-logo" />
            <span class="brand-name">Eyiwunmi <span>✦</span></span>
        </a>
        <ul class="menu-list">
            <li class="menu-item active" id="menu-dash">
                <a href="#" onclick="showPage('dashboard')">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="menu-item" id="menu-outfits">
                <a href="#" onclick="showPage('outfits')">
                    <span class="icon">👗</span>
                    <span>Outfits Manager</span>
                </a>
            </li>
            <li class="menu-item" id="menu-inbox">
                <a href="#" onclick="showPage('inbox')">
                    <span class="icon">📬</span>
                    <span>Inbox</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            Admin v1.0 &copy; 2026
        </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">
        <!-- HEADER -->
        <header class="content-header">
            <h1 id="page-title">Dashboard</h1>
            <div id="header-actions">
                <button class="btn-primary" onclick="openAddModal()">➕ Add Outfit</button>
            </div>
        </header>

        <!-- PAGE 1: DASHBOARD -->
        <section id="page-dashboard" class="page active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="info">
                        <h3>Total Outfits</h3>
                        <div class="number" id="stat-total-outfits">0</div>
                    </div>
                    <div class="icon-box">🧥</div>
                </div>
                <div class="stat-card">
                    <div class="info">
                        <h3>Traditional &amp; Native</h3>
                        <div class="number" id="stat-total-traditional">0</div>
                    </div>
                    <div class="icon-box">👘</div>
                </div>
                <div class="stat-card">
                    <div class="info">
                        <h3>English Suits</h3>
                        <div class="number" id="stat-total-suits">0</div>
                    </div>
                    <div class="icon-box">👔</div>
                </div>
                <div class="stat-card">
                    <div class="info">
                        <h3>Unread Enquiries</h3>
                        <div class="number" id="stat-total-inbox">0</div>
                    </div>
                    <div class="icon-box">✉️</div>
                </div>
            </div>

            <div style="margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between;">
                <h2 style="font-family: var(--font-display); font-size: 1.6rem; color: var(--gold-light);">Recent Customer Enquiries</h2>
                <a href="#" onclick="showPage('inbox')" style="color: var(--gold); font-weight: 600; font-size: 0.9rem; text-decoration: none;">View All Inbox →</a>
            </div>

            <div id="recent-inbox-preview" class="msg-list">
                <!-- previews populated dynamically -->
            </div>
        </section>

        <!-- PAGE 2: OUTFITS MANAGER -->
        <section id="page-outfits" class="page">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Img</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Fabric</th>
                            <th>Badge</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="outfits-table-body">
                        <!-- Populated dynamically -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- PAGE 3: INBOX -->
        <section id="page-inbox" class="page">
            <div style="display:flex; justify-content: flex-end; margin-bottom: 20px;">
                <button class="btn-action delete" style="padding: 10px 20px; border-radius: 8px;" onclick="clearAllMessages()">🧹 Clear All Messages</button>
            </div>
            <div id="inbox-messages" class="msg-list">
                <!-- Populated dynamically -->
            </div>
        </section>
    </main>

    <!-- ===== OUTFIT EDIT / ADD MODAL ===== -->
    <div class="modal-overlay" id="outfitModal">
        <div class="modal-box">
            <header class="modal-header">
                <h2 id="modal-title-text">Add Outfit</h2>
                <button class="btn-close" onclick="closeOutfitModal()">✕</button>
            </header>
            <div class="modal-body">
                <form id="outfitForm" onsubmit="saveOutfitForm(event)">
                    <input type="hidden" id="form-outfit-id" value="" />
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="form-name">Outfit Name</label>
                            <input type="text" id="form-name" placeholder="Royal Agbada" required />
                        </div>
                        <div class="form-group">
                            <label for="form-category">Category</label>
                            <select id="form-category" required>
                                <option value="men">Men</option>
                                <option value="women">Women</option>
                                <option value="kids">Kids</option>
                                <option value="asoebi">Asoebi</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="form-price">Price (e.g. ₦80,000)</label>
                            <input type="text" id="form-price" placeholder="₦80,000" required />
                        </div>
                        <div class="form-group">
                            <label for="form-oldPrice">Old Price (Optional)</label>
                            <input type="text" id="form-oldPrice" placeholder="₦100,000" />
                        </div>
                        <div class="form-group">
                            <label for="form-image">Image Filename (under eyiwunmi_images/)</label>
                            <select id="form-image" required>
                                <option value="Whats2026-07-05 at 10.03.43 PM.jpeg">Sunset Yellow Gown (Whats2026-07-05 at 10.03.43 PM.jpeg)</option>
                                <option value="WhatsApp Imag26-07-05 at 10.03.41 PM.jpeg">Navy Blue Senator (WhatsApp Imag26-07-05 at 10.03.41 PM.jpeg)</option>
                                <option value="WhatsApp Image 2026 at 10.03.40 PM.jpeg">Charcoal Senator (WhatsApp Image 2026 at 10.03.40 PM.jpeg)</option>
                                <option value="WhatsApp Image 2026-07-05 at 10. PM.jpeg">Beige Kaftan (WhatsApp Image 2026-07-05 at 10. PM.jpeg)</option>
                                <option value="WhatsApp Image 2026-07-05 at 10.03.37 PM.jpeg">Black Tuxedo (WhatsApp Image 2026-07-05 at 10.03.37 PM.jpeg)</option>
                                <option value="WhatsApp Image 2026-07-05 at 10.03.38 PM.jpeg">Navy Suit (WhatsApp Image 2026-07-05 at 10.03.38 PM.jpeg)</option>
                                <option value="WhatsApp Image 2026-07-05 at 10.03.39 PM.jpeg">Grey Suit (WhatsApp Image 2026-07-05 at 10.03.39 PM.jpeg)</option>
                                <option value="WhatsApp Image 2026-07-05 at 10.03.4M.jpeg">Burgundy Suit (WhatsApp Image 2026-07-05 at 10.03.4M.jpeg)</option>

        // ============================================================
        // LOCAL STORAGE MANAGEMENT
        // ============================================================
        function getOutfits() {
            if (!localStorage.getItem('eyiwunmi_outfits')) {
                localStorage.setItem('eyiwunmi_outfits', JSON.stringify(defaultOutfits));
            }
            return JSON.parse(localStorage.getItem('eyiwunmi_outfits'));
        }

        function saveOutfits(arr) {
            localStorage.setItem('eyiwunmi_outfits', JSON.stringify(arr));
            syncUI();
        }

        function getMessages() {
            return JSON.parse(localStorage.getItem('eyiwunmi_messages') || '[]');
        }

        function saveMessages(arr) {
            localStorage.setItem('eyiwunmi_messages', JSON.stringify(arr));
            syncUI();
        }

        // ============================================================
        // STATE NAVIGATION
        // ============================================================
        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Remove active style from menu
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));

            // Show active page
            document.getElementById('page-' + pageId).classList.add('active');

            // Apply active class to menu item
            if (pageId === 'dashboard') {
                document.getElementById('menu-dash').classList.add('active');
                document.getElementById('page-title').textContent = 'Dashboard Overview';
                document.getElementById('header-actions').style.display = 'block';
            } else if (pageId === 'outfits') {
                document.getElementById('menu-outfits').classList.add('active');
                document.getElementById('page-title').textContent = 'Outfits Inventory';
                document.getElementById('header-actions').style.display = 'block';
            } else if (pageId === 'inbox') {
                document.getElementById('menu-inbox').classList.add('active');
                document.getElementById('page-title').textContent = 'Customer Inbox';
                document.getElementById('header-actions').style.display = 'none';
            }
        }

        // ============================================================
        // RENDERING & DATA UPDATE
        // ============================================================
        function syncUI() {
            const outfits = getOutfits();
            const messages = getMessages();

            // 1. Dashboard stock stats
            document.getElementById('stat-total-outfits').textContent = outfits.length;
            
            // Count categories
            const traditionalCount = outfits.filter(o => o.category === 'asoebi' || o.category === 'kids').length;
            const suitCount = outfits.filter(o => o.category === 'men' && o.image.includes('suit') || o.name.toLowerCase().includes('suit')).length;
            document.getElementById('stat-total-traditional').textContent = traditionalCount;
            document.getElementById('stat-total-suits').textContent = suitCount;
            document.getElementById('stat-total-inbox').textContent = messages.length;

            // 2. Outfits table
            const tableBody = document.getElementById('outfits-table-body');
            if (outfits.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="empty-state"><span class="icon">👗</span>No outfits in stock. Add one now!</td></tr>`;
            } else {
                tableBody.innerHTML = outfits.map(item => `
                    <tr>
                        <td>
                            <img src="../${item.image}" class="img-cell" onerror="this.src='../eyiwunmi_images/LOGO_FAVICON.png'" alt="Product Image" />
                        </td>
                        <td style="font-weight: 600; color: var(--gold-light);">${item.name}</td>
                        <td style="text-transform: capitalize;">${item.category}</td>
                        <td style="font-weight: 700; color: var(--white);">${item.price}</td>
                        <td>${item.fabric}</td>
                        <td>
                            <span class="badge-span ${item.badge || 'none'}">${item.badgeText || 'None'}</span>
                        </td>
                        <td>
                            <button class="btn-action edit" onclick="openEditModal(${item.id})">✏️ Edit</button>
                            <button class="btn-action delete" onclick="deleteOutfit(${item.id})">🗑️ Delete</button>
                        </td>
                    </tr>
                `).join('');
            }

            // 3. Inbox messages
            const inboxContainer = document.getElementById('inbox-messages');
            const recentInbox = document.getElementById('recent-inbox-preview');

            if (messages.length === 0) {
                const emptyHTML = `<div class="empty-state"><span class="icon">📬</span>Your inbox is clean. No enquiries yet!</div>`;
                inboxContainer.innerHTML = emptyHTML;
                recentInbox.innerHTML = emptyHTML;
            } else {
                // Populate full inbox
                inboxContainer.innerHTML = messages.map((msg, index) => `
                    <div class="msg-card">
                        <button class="btn-delete-msg" onclick="deleteMessage(${index})">✕</button>
                        <div class="msg-header">
                            <span class="sender-name">${msg.name}</span>
                            <span class="date">${msg.date}</span>
                        </div>
                        <div class="sender-meta">📧 ${msg.email}</div>
                        <p class="msg-text">${msg.message}</p>
                    </div>
                `).join('');

                // Populate dashboard recent preview (up to 3 messages)
                const sortedRecent = [...messages].reverse().slice(0, 3);
                recentInbox.innerHTML = sortedRecent.map((msg) => `
                    <div class="msg-card" style="padding: 16px;">
                        <div class="msg-header">
                            <span class="sender-name" style="font-size:1rem;">${msg.name}</span>
                            <span class="date" style="font-size:0.75rem;">${msg.date}</span>
                        </div>
                        <div class="sender-meta" style="font-size:0.8rem;">📧 ${msg.email}</div>
                        <p class="msg-text" style="padding: 8px 12px; font-size:0.9rem;">${msg.message}</p>
                    </div>
                `).join('');
            }
        }

        // ============================================================
        // CRUD ACTIONS
        // ============================================================
        const outfitModal = document.getElementById('outfitModal');
        const outfitForm = document.getElementById('outfitForm');

        function openAddModal() {
            document.getElementById('modal-title-text').textContent = 'Add Outfit';
            outfitForm.reset();
            document.getElementById('form-outfit-id').value = '';
            outfitModal.classList.add('active');
        }

        function openEditModal(id) {
            const outfits = getOutfits();
            const item = outfits.find(o => o.id === id);
            if (!item) return;

            document.getElementById('modal-title-text').textContent = 'Edit Outfit Details';
            document.getElementById('form-outfit-id').value = item.id;
            document.getElementById('form-name').value = item.name;
            document.getElementById('form-category').value = item.category;
            document.getElementById('form-price').value = item.price;
            document.getElementById('form-oldPrice').value = item.oldPrice || '';
            
            // Extract filename from path (e.g. "eyiwunmi_images/WhatsApp.jpeg" -> "WhatsApp.jpeg")
            const imgFilename = item.image.replace('eyiwunmi_images/', '');
            document.getElementById('form-image').value = imgFilename;
            
            document.getElementById('form-badge').value = item.badge || '';
            document.getElementById('form-fabric').value = item.fabric;
            document.getElementById('form-sizes').value = item.sizes;
            document.getElementById('form-colours').value = item.colours.join(', ');
            document.getElementById('form-description').value = item.description;

            outfitModal.classList.add('active');
        }

        function closeOutfitModal() {
            outfitModal.classList.remove('active');
        }

        function saveOutfitForm(e) {
            e.preventDefault();
            const idVal = document.getElementById('form-outfit-id').value;
            const name = document.getElementById('form-name').value.trim();
            const category = document.getElementById('form-category').value;
            const price = document.getElementById('form-price').value.trim();
            const oldPrice = document.getElementById('form-oldPrice').value.trim() || null;
            const imageFile = document.getElementById('form-image').value;
            const badge = document.getElementById('form-badge').value;
            const fabric = document.getElementById('form-fabric').value.trim();
            const sizes = document.getElementById('form-sizes').value.trim();
            
            // Format colours from comma-separated string to Array
            const colours = document.getElementById('form-colours').value.split(',')
                                    .map(s => s.trim())
                                    .filter(s => s.length > 0);

            const description = document.getElementById('form-description').value.trim();

            const outfits = getOutfits();

            // Set badge text matching badge value
            let badgeText = null;
            if (badge) {
                badgeText = badge.charAt(0).toUpperCase() + badge.slice(1);
            }

            const outfitData = {
                name,
                category,
                image: 'eyiwunmi_images/' + imageFile,
                price,
                oldPrice,
                colours,
                sizes,
                fabric,
                availability: 'In Stock',
                badge: badge || null,
                badgeText,
                description
            };

            if (idVal) {
                // Edit mode
                const targetId = parseInt(idVal);
                const index = outfits.findIndex(o => o.id === targetId);
                if (index !== -1) {
                    outfits[index] = { ...outfits[index], ...outfitData };
                }
            } else {
                // Add mode
                // Find next available ID
                const nextId = outfits.length > 0 ? Math.max(...outfits.map(o => o.id)) + 1 : 1;
                outfits.push({
                    id: nextId,
                    ...outfitData
                });
            }

            saveOutfits(outfits);
            closeOutfitModal();
        }

        function deleteOutfit(id) {
            if (confirm('Are you sure you want to remove this outfit from the inventory?')) {
                const outfits = getOutfits();
                const filtered = outfits.filter(o => o.id !== id);
                saveOutfits(filtered);
            }
        }

        // ============================================================
        // MESSAGES ACTIONS
        // ============================================================
        function deleteMessage(index) {
            if (confirm('Remove this message from your inbox?')) {
                const messages = getMessages();
                messages.splice(index, 1);
                saveMessages(messages);
            }
        }

        function clearAllMessages() {
            if (confirm('Are you sure you want to permanently clear the entire inbox?')) {
                saveMessages([]);
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        // Trigger initialization
        syncUI();
        showPage('dashboard');
    </script>
